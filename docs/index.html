<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIS - 3D Gallery</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: black;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 8px;
        }
        #debug {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 4px;
            z-index: 100;
            font-family: monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>EIS - 3D Gallery</h2>
        <p><strong>Controls:</strong></p>
        <p>WASD - Move</p>
        <p>Mouse - Look Around</p>
        <p>Click to enable controls</p>
        <p>ESC - Release mouse</p>
    </div>
    <div id="loading">Loading model...</div>
    <div id="debug">Position: X: 0 Y: 0 Z: 0</div>

    <script src="https://cdn.jsdelivr.net/gh/mrdoob/stats.js@r17/build/stats.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';
        import { VRButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera (first-person POV)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 38, 10); // Start inside the model
        scene.add(camera);

        // Offset group for VR scene positioning
        const sceneOffsetGroup = new THREE.Group();
        scene.add(sceneOffsetGroup);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance', xrCompatible: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Cap pixel ratio for performance
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.localClippingEnabled = true;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Add VR Button
        document.body.appendChild(VRButton.createButton(renderer));

        // Initialize VR with proper starting position
        renderer.xr.addEventListener('sessionstart', () => {
            camera.position.x = 0;
            camera.position.z = 10;
            // Offset scene DOWN by 1.3 so camera at 1.7 appears at eye level 3.0 relative to scene
            sceneOffsetGroup.position.y = -1.3;
        });

        // VR Controller movement tracking
        const vrMovement = { forward: 0, strafe: 0 };
        const vrSpeed = 0.05; // VR movement speed per frame
        let vrInitialHeadsetY = null; // Record initial headset Y from XR on first frame

        // Initialize stats.js for FPS monitoring
        const stats = new Stats();
        stats.showPanel(0); // 0: fps, 1: ms, 2: mb, 3+: custom
        stats.dom.style.position = 'absolute';
        stats.dom.style.top = '0px';
        stats.dom.style.right = '0px';
                stats.dom.style.left = 'auto';
        document.body.appendChild(stats.dom);

        // Add fog for culling far objects
      //  scene.fog = new THREE.Fog(0x222222, 300, 500);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        // Primary directional light (main overhead)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(30, 50, 30);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 200;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        directionalLight.shadow.bias = -0.001;
        scene.add(directionalLight);

        // Fill light (secondary directional from opposite angle)
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
        fillLight.position.set(-40, 35, -40);
        fillLight.castShadow = true;
        fillLight.shadow.mapSize.width = 1024;
        fillLight.shadow.mapSize.height = 1024;
        fillLight.shadow.camera.far = 150;
        fillLight.shadow.camera.left = -80;
        fillLight.shadow.camera.right = 80;
        fillLight.shadow.camera.top = 80;
        fillLight.shadow.camera.bottom = -80;
        scene.add(fillLight);



        // Material palette for consistent coloring
        const materials = {
            wall: new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.95, metalness: 0.0 }),
            floor: new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.92, metalness: 0.05 }),
            ceiling: new THREE.MeshStandardMaterial({ color: 0xe4e4e4, roughness: 0.85, metalness: 0.0 }),
            pillar: new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.7, metalness: 0.1 }),
            beam: new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.7, metalness: 0.1 }),
            duct: new THREE.MeshStandardMaterial({ color: 0xC0C0C0, roughness: 0.4, metalness: 0.9 }),
            door: new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.6, metalness: 0.2 }),
            window: new THREE.MeshStandardMaterial({ color: 0xb0e0e6, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.7 }),
            railing: new THREE.MeshStandardMaterial({ color: 0x606060, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.0 }),
            accent: new THREE.MeshStandardMaterial({ color: 0x4a90e2, roughness: 0.5, metalness: 0.3 }),
            default: new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7, metalness: 0.2 }),
            catwalk: new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.8, metalness: 0.5, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
        };

        // Function to assign materials based on mesh name
        function assignMaterial(mesh) {
            const name = mesh.name.toLowerCase();
            
            if (name.includes('wall')) {
                mesh.material = materials.wall;
            } else if (name.includes('floor') || name.includes('ground')) {
                mesh.material = materials.floor;
            } else if (name.includes('ceiling') || name.includes('roof')) {
                mesh.material = materials.ceiling;
            } else if (name.includes('pillar') || name.includes('column')) {
                mesh.material = materials.pillar;
            } else if (name.includes('beam') || name.includes('truss')) {
                mesh.material = materials.beam;
            } else if (name.includes('duct') || name.includes('pipe')) {
                mesh.material = materials.duct;
            } else if (name.includes('door')) {
                mesh.material = materials.door;
            } else if (name.includes('window') || name.includes('glass')) {
                mesh.material = materials.window;
            } else if (name.includes('railing') || name.includes('rail')) {
                mesh.material = materials.railing;
            } else if (name.includes('accent') || name.includes('trim') || name.includes('detail')) {
                mesh.material = materials.accent;
            } else {
                mesh.material = materials.default;
            }
        }

        // Load FBX model
        let model = null;
        let floorBounds = null;
        const fbxLoader = new FBXLoader();
        fbxLoader.load('model/environment.fbx', (fbx) => {
            model = fbx;
            let floorMesh = null;
            
            fbx.traverse((child) => {
                if (child.isMesh) {
                    // Apply consistent materials based on mesh name
                    assignMaterial(child);
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // Add border edges to catwalk meshes
                    if (child.name.toLowerCase().includes('catwalk')) {
                        const edges = new THREE.EdgesGeometry(child.geometry);
                        const line = new THREE.LineSegments(
                            edges,
                            new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 })
                        );
                        child.add(line);
                    }
                    
                    // Find the floor mesh
                    if (child.name.toLowerCase().includes('floor') || child.name.toLowerCase().includes('ground')) {
                        floorMesh = child;
                    }
                }
            });
            
            // Calculate bounds from floor mesh (X and Z only)
            if (floorMesh) {
                if (!floorMesh.geometry.boundingBox) {
                    floorMesh.geometry.computeBoundingBox();
                }
                const bbox = floorMesh.geometry.boundingBox;
                floorBounds = {
                    minX: floorMesh.position.x + bbox.min.x,
                    maxX: floorMesh.position.x + bbox.max.x,
                    minZ: floorMesh.position.z + bbox.min.z,
                    maxZ: floorMesh.position.z + bbox.max.z
                };
                const floorY = floorMesh.position.y + bbox.max.y;
                console.log('✓ Floor bounds calculated:', floorBounds);
                console.log('✓ Floor mesh Y position:', floorMesh.position.y, '| Floor top Y:', floorY, '| Floor bbox:', bbox);
            } else {
                // Default bounds if no floor found
                floorBounds = {
                    minX: -100,
                    maxX: 100,
                    minZ: -100,
                    maxZ: 100
                };
                console.log('⚠ No floor mesh found, using default bounds');
            }
            
            sceneOffsetGroup.add(fbx);
            console.log('✓ Model loaded successfully');
            console.log('Model children count:', fbx.children.length);
            document.getElementById('loading').style.display = 'none';
        }, 
        (progress) => {
            console.log('Loading:', (progress.loaded / progress.total * 100).toFixed(0) + '%');
        },
        (error) => {
            console.error('✗ Error loading model:', error);
            document.getElementById('loading').textContent = 'Error: model/environment.fbx not found';
        });

        // Ground plane for reference
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x6d6c6d, roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        sceneOffsetGroup.add(ground);

        // Roof plane
        const roof = new THREE.Mesh(
            new THREE.PlaneGeometry(1820, 1820),
            materials.ceiling
        );
        roof.rotation.x = Math.PI / 2;
        roof.position.y = 1520;
        roof.receiveShadow = true;
        roof.castShadow = true;
        sceneOffsetGroup.add(roof);

        // Controls
        let isLocked = false;
        let pitch = 0;
        let yaw = 0;

        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false
        };

        const moveSpeed = 3; 
        const pointerSpeed = 0.005;

        // Pointer lock
        document.addEventListener('click', () => {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = !!document.pointerLockElement;
            document.getElementById('info').style.opacity = isLocked ? '0.3' : '1';
        });

        // Mouse look
        document.addEventListener('mousemove', (event) => {
            if (!isLocked) return;

            yaw -= event.movementX * pointerSpeed;
            pitch -= event.movementY * pointerSpeed;

            const PI_2 = Math.PI / 2;
            pitch = Math.max(-PI_2, Math.min(PI_2, pitch));

            const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        });

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.exitPointerLock = document.exitPointerLock || document.mozExitPointerLock;
                document.exitPointerLock();
                return;
            }

            switch (e.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveState.forward = true;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveState.backward = true;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveState.left = true;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveState.right = true;
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveState.forward = false;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveState.backward = false;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveState.left = false;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveState.right = false;
                    break;
            }
        });

        // Raycaster for wall collision detection
        const raycaster = new THREE.Raycaster();
        const collisionDistance = 40; // Look 5 units ahead for walls
        let lastCollisionLog = 0;

        // Check if there's a wall ahead
        function checkWallCollision(origin, direction) {
            if (!model) return false;
            raycaster.set(origin, direction);
            const intersects = raycaster.intersectObject(model, true);
            if (intersects.length > 0) {
                const dist = intersects[0].distance;
                // Log collision only occasionally to reduce console spam
                if (performance.now() - lastCollisionLog > 500) {
                    lastCollisionLog = performance.now();
                }
                return dist < collisionDistance;
            }
            return false;
        }

        // Movement with proper boundary and collision checking
        function updateMovement() {
            if (!moveState.forward && !moveState.backward && !moveState.left && !moveState.right) {
                return; // No movement keys pressed
            }

            const forward = new THREE.Vector3(
                -Math.sin(yaw),
                0,
                -Math.cos(yaw)
            ).normalize();

            const right = new THREE.Vector3(
                Math.sin(yaw + Math.PI / 2),
                0,
                Math.cos(yaw + Math.PI / 2)
            ).normalize();

            // Check collision BEFORE moving - check in each direction separately
            let canMoveForward = true;
            let canMoveBackward = true;
            let canMoveLeft = true;
            let canMoveRight = true;

            if (moveState.forward) {
                canMoveForward = !checkWallCollision(camera.position, forward);
            }
            if (moveState.backward) {
                canMoveBackward = !checkWallCollision(camera.position, forward.clone().multiplyScalar(-1));
            }
            if (moveState.left) {
                canMoveLeft = !checkWallCollision(camera.position, right.clone().multiplyScalar(-1));
            }
            if (moveState.right) {
                canMoveRight = !checkWallCollision(camera.position, right);
            }

            let newPos = camera.position.clone();

            // Only apply movement if collision check passed
            if (moveState.forward && canMoveForward) {
                newPos.addScaledVector(forward, moveSpeed);
            }
            if (moveState.backward && canMoveBackward) {
                newPos.addScaledVector(forward, -moveSpeed);
            }
            if (moveState.left && canMoveLeft) {
                newPos.addScaledVector(right, -moveSpeed);
            }
            if (moveState.right && canMoveRight) {
                newPos.addScaledVector(right, moveSpeed);
            }

            // Check bounds first (X and Z only)
            if (floorBounds) {
                const inBounds = newPos.x >= floorBounds.minX && newPos.x <= floorBounds.maxX &&
                    newPos.z >= floorBounds.minZ && newPos.z <= floorBounds.maxZ;
                
                if (!inBounds) {
                    console.log('OUT OF BOUNDS - blocked at:', newPos);
                    return; // Don't move if out of bounds
                }
            }

            // All checks passed, move the camera
            camera.position.copy(newPos);
        }

        // Animation loop with XR support
        function animate() {
            stats.begin();
            
            if (renderer.xr.isPresenting) {
                // VR mode: scene is offset, camera tracks naturally
                if (frameCount < 5) {
                    console.log(`Frame ${frameCount}: VR mode, scene offset = ${sceneOffsetGroup.position.y.toFixed(3)}`);
                }
                
                // VR mode: query current controller input each frame
                const session = renderer.xr.getSession();
                if (session) {
                    const inputSources = Array.from(session.inputSources);
                    vrMovement.forward = 0;
                    vrMovement.strafe = 0;
                    
                    inputSources.forEach((source) => {
                        if (source.gamepad && source.gamepad.axes.length >= 2) {
                            // Use first available controller/hand with gamepad
                            vrMovement.strafe = source.gamepad.axes[0];
                            vrMovement.forward = -source.gamepad.axes[1];
                        }
                    });
                }
                
                // Apply VR controller movement (thumbstick locomotion) on top of headset tracking
                const vrDirection = new THREE.Vector3();
                vrDirection.x = vrMovement.strafe;
                vrDirection.z = vrMovement.forward;
                
                if (vrDirection.length() > 0.1) { // Deadzone
                    vrDirection.normalize();
                    vrDirection.multiplyScalar(vrSpeed);
                    
                    // Apply movement relative to camera orientation
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    
                    forward.y = 0;
                    right.y = 0;
                    forward.normalize();
                    right.normalize();
                    
                    const moveVector = new THREE.Vector3()
                        .addScaledVector(forward, vrDirection.z)
                        .addScaledVector(right, vrDirection.x);
                    
                    camera.position.add(moveVector);
                }
            } else {
                // Desktop mode: reset scene offset
                sceneOffsetGroup.position.y = 0;
                updateMovement();
            }
            
            renderer.render(scene, camera);
            
            // Update debug display only every 5 frames to reduce DOM thrashing
            if (frameCount % 5 === 0) {
                document.getElementById('debug').textContent = 
                    `Position: X: ${camera.position.x.toFixed(2)} Y: ${camera.position.y.toFixed(2)} Z: ${camera.position.z.toFixed(2)}`;
            }
            
            // Debug: show scene info on first few frames
            if (frameCount < 3) {
                console.log('Frame', frameCount, '- Scene objects:', scene.children.length, 'Model loaded:', model !== null);
            }
            frameCount++;
            stats.end();
        }

        let frameCount = 0;

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Use setAnimationLoop for XR compatibility
        renderer.setAnimationLoop(animate);
    </script>
</body>
</html>
